syntax = "proto3";

package payment;

option go_package = "github.com/Almukhammed77/order-payment-generated/payment;payment";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc ProcessPayment (PaymentRequest) returns (PaymentResponse);

  rpc SubscribeToOrderUpdates(PaymentRequest) returns (stream PaymentResponse);
  rpc SubscribeToOrderUpdates (OrderRequest) returns (stream OrderStatusUpdate);
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2; 
}

message PaymentResponse {
  string status = 1;
  string transaction_id = 2;
}

message OrderRequest {
  string order_id = 1;
}

message OrderStatusUpdate {
  string order_id = 1;
  string status = 2;
  google.protobuf.Timestamp updated_at = 3;
}
