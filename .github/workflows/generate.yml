name: Remote Proto Generation

on:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository A (Protos)
        uses: actions/checkout@v3

      - name: Install Protoc & Plugins
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"

      - name: Generate Code
        run: |
          mkdir -p gen/go
          protoc --go_out=gen/go --go-grpc_out=gen/go payment/payment.proto

      - name: Push to Repository B (Generated)
        env:
          GH_TOKEN: ${{ secrets.PROTO_GEN_TOKEN }}
        run: |
          # Переходим в папку со сгенерированным кодом
          cd gen/go/github.com/Almukhammed77/order-payment-generated
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated gRPC code generation"
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/Almukhammed77/order-payment-generated.git
          git push -f origin main
